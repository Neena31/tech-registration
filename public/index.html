<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechX Summit 2026</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-wrap">
      <section class="hero">
        <h1>TechX Summit 2026</h1>
        <p class="subtitle">Join the innovation hub of creators, builders and engineers.</p>
      </section>

      <section class="card">
        <h2>Register</h2>
        <form id="registrationForm" novalidate>
          <label for="name">Full Name</label>
          <input id="name" name="name" type="text" required placeholder="Jane Doe" />

          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" required placeholder="jane@example.com" />

          <label for="phone">Phone Number</label>
          <input id="phone" name="phone" type="tel" required placeholder="+1 123 456 7890" />

          <label for="college">College / Company</label>
          <input id="college" name="college" type="text" required placeholder="Acme University" />

          <button id="submitBtn" type="submit">Register Now</button>
          <p id="formMessage" class="message" role="alert"></p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
